{% extends 'base.html' %}

{% block title %}Ro'yxatdan O'tish{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h4>Yangi Akkaunt Yaratish</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors|striptags }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-success w-100 mt-3">Ro'yxatdan O'tish</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small>Akkauntingiz bormi? <a href="{% url 'login' %}">Tizimga kiring</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
