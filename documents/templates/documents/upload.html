{% extends 'base.html' %}

{% block title %}Hujjat Yuklash{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Yangi Hujjat Yuklash (E2EE)</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" id="uploadForm">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Hujjat nomi</label>
                        <input type="text" name="title" class="form-control" placeholder="Masalan: Maxfiy Hisobot 2026" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Qisqacha tavsifi</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Hujjat haqida qisqacha ma'lumot..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-muted fw-bold">Maxfiylik darajasi</label>
                            <select name="privacy_level" id="privacy_level" class="form-select" required>
                                <option value="simple">Oddiy (Himoyalanmagan)</option>
                                <option value="protected" selected>Himoyalangan (SSS orqali)</option>
                            </select>
                        </div>
                        
                       <div class="col-md-4 mb-3">
                            <label class="form-label text-muted fw-bold">Qabul Qiluvchi</label>
                            <select name="receiver" id="receiver" class="form-select" required>
                                <option value="">Tanlang...</option>
                                {% for r in receivers %}
                                    <option value="{{ r.id }}" data-public-key="{{ r.public_key|default:'' }}" {% if selected_receiver_id == r.id|stringformat:"s" %}selected{% endif %}>
                                        {{ r.username }} ({{ r.last_name }} {{ r.first_name }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-4 mb-3" id="approver-div">
                            <label for="approver" class="form-label text-muted fw-bold">Tasdiqlovchi (Director)</label>
                            <select name="approver" id="approver" class="form-select">
                                <option value="" disabled selected>Tasdiqlovchini tanlang...</option>
                                {% for approver in approvers %}
                                    <option value="{{ approver.id }}" data-public-key="{{ approver.public_key|default:'' }}">
                                        {{ approver.first_name }} {{ approver.last_name }} ({{ approver.username }}) - {{ approver.get_role_display }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3 mt-2">
                        <label class="form-label text-muted fw-bold">Faylni tanlang</label>
                        <input type="file" name="file" class="form-control form-control-lg" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" id="submitBtn" class="btn btn-success btn-lg">Shifrlash va Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- SSS algoritmi uchun xalqaro standart kutubxona -->
<script src="https://cdn.jsdelivr.net/npm/secrets.js-grempe@2.0.0/secrets.min.js"></script>

<script>
// bfcache (Back-Forward Cache) ga qarshi himoya
window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
        // Agar sahifa brauzer cachesidan yuklanayotgan bo'lsa, formani tozalash
        const form = document.getElementById('uploadForm');
        if (form) {
            form.reset();
        }
        // Barcha input va textarea elementlarini tozalash
        document.querySelectorAll('input, textarea, select').forEach(input => {
            if (input.type === 'file') {
                input.value = '';
            } else if (input.type !== 'hidden') {
                input.value = '';
            }
        });
    }
});

document.addEventListener("DOMContentLoaded", function() {
    const privacySelect = document.getElementById("privacy_level");
    const approverDiv = document.getElementById("approver-div");
    const approverSelect = document.getElementById("approver");
    const form = document.getElementById("uploadForm");
    const submitBtn = document.getElementById("submitBtn");

    // ==========================================
    // UI DIZAYN MANTIQI
    // ==========================================
    function toggleApprover() {
        if (privacySelect.value === "simple") {
            approverDiv.style.display = "none";
            approverSelect.removeAttribute("required");
            approverSelect.value = ""; 
        } else {
            approverDiv.style.display = "block";
            approverSelect.setAttribute("required", "required");
        }
    }
    toggleApprover();
    privacySelect.addEventListener("change", toggleApprover);

    // ==========================================
    // E2EE SHIFRLASH VA SSS BO'LISH MANTIQI
    // ==========================================
    function bufferToHex(buffer) {
        return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    function bufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        bytes.forEach(b => binary += String.fromCharCode(b));
        return window.btoa(binary);
    }

    form.addEventListener("submit", async function(e) {
        // Agar "simple" himoya bo'lsa, to'g'ridan-to'g'ri serverga ketsin
        if (privacySelect.value === "simple") return;

        e.preventDefault(); 

        const fileInput = document.querySelector('input[name="file"]');
        const file = fileInput.files[0];
        if (!file) return;

        const originalBtnText = submitBtn.innerHTML;
        submitBtn.innerHTML = "Shifrlanmoqda... ⏳";
        submitBtn.disabled = true;

        try {
            // 1. Yangi 256-bitli AES-GCM kalit yaratish
            const aesKey = await window.crypto.subtle.generateKey(
                { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
            );
            const exportedAesKey = await window.crypto.subtle.exportKey("raw", aesKey);
            const aesKeyHex = bufferToHex(exportedAesKey);

            // 2. Faylni shifrlash
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const fileBuffer = await file.arrayBuffer();
            const encryptedFile = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv }, aesKey, fileBuffer
            );

            const combinedFile = new Uint8Array(iv.length + encryptedFile.byteLength);
            combinedFile.set(iv, 0);
            combinedFile.set(new Uint8Array(encryptedFile), iv.length);
            const encryptedBlob = new Blob([combinedFile], { type: 'application/octet-stream' });

            // 3. Shamir algoritmi
            const shares = secrets.share(aesKeyHex, 3, 2); 

            // 4. Ochiq kalitlarni olish
            const receiverSelect = document.getElementById('receiver');
            const receiverPubKeyBase64 = receiverSelect.options[receiverSelect.selectedIndex].getAttribute('data-public-key');
            const approverPubKeyBase64 = approverSelect.options[approverSelect.selectedIndex].getAttribute('data-public-key');

            if (!receiverPubKeyBase64 || !approverPubKeyBase64) {
                throw new Error("Kechirasiz, tanlangan foydalanuvchilarning E2EE kalitlari yo'q!");
            }

            async function importRSAKey(base64Key) {
                const binaryDerString = window.atob(base64Key);
                const binaryDer = new Uint8Array(binaryDerString.length);
                for (let i = 0; i < binaryDerString.length; i++) {
                    binaryDer[i] = binaryDerString.charCodeAt(i);
                }
                return await window.crypto.subtle.importKey(
                    "spki", binaryDer.buffer, { name: "RSA-OAEP", hash: "SHA-256" }, false, ["encrypt"]
                );
            }

            const receiverPubKey = await importRSAKey(receiverPubKeyBase64);
            const approverPubKey = await importRSAKey(approverPubKeyBase64);
            const enc = new TextEncoder();

            // 5. Ulushlarni shifrlash
            const encryptedShare2 = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" }, receiverPubKey, enc.encode(shares[1])
            );
            const encryptedShare3 = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" }, approverPubKey, enc.encode(shares[2])
            );

            // 6. FormData orqali serverga yuborish
            const formData = new FormData(form);
            formData.set('file', encryptedBlob, file.name + ".enc");
            formData.append('share_1', shares[0]); 
            formData.append('share_2_enc', bufferToBase64(encryptedShare2));
            formData.append('share_3_enc', bufferToBase64(encryptedShare3));
            // Backend bu E2EE orqali kelganini bilishi uchun belgi
            formData.append('is_e2ee', 'true'); 

            submitBtn.innerHTML = "Serverga uzatilmoqda... 🚀";

            const response = await fetch(window.location.href, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            if (response.ok) {
                window.location.href = "/documents/inbox/"; 
            } else {
                throw new Error("Server ma'lumotni qabul qilmadi.");
            }

        } catch (error) {
            console.error("E2EE Xatolik:", error);
            alert("Xatolik: " + error.message);
            submitBtn.innerHTML = "Shifrlash va Saqlash";
            submitBtn.disabled = false;
        }
    });
});
</script>
{% endblock %}
